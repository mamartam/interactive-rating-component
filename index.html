<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="images/x-icon"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./dist/css/main.css" />
    <title>Interactive rating component</title>
  </head>
  <body>
    <main class="component">
      <section class="component__rating rating">
        <div class="rating__image-container">
          <img class="star-img" src="./assets/images/icon-star.svg" alt="" />
        </div>
        <div class="rating__info-container">
          <h1 class="rating__header">How did we do?</h1>
          <p class="rating__description">
            Please let us know how we did with your support request. All
            feedback is appreciated to help us improve our offering!
          </p>
        </div>
        <form class="rating__form" action="#" method="post">
          <div class="rating__form--inputs">
            <label class="rating__form--label" for="one">1</label>
            <input type="radio" id="one" name="rating" />
            <label class="rating__form--label" for="two">2</label>
            <input type="radio" id="two" name="rating" />
            <label class="rating__form--label" for="three">3</label>
            <input type="radio" id="three" name="rating" />
            <label class="rating__form--label" for="four">4</label>
            <input type="radio" id="four" name="rating" />
            <label class="rating__form--label" for="five">5</label>
            <input type="radio" id="five" name="rating" />
          </div>

          <button type="submit" class="rating__submit-btn">Submit</button>
        </form>
      </section>
      <section class="component__thank-you-state"></section>
    </main>
    <script defer src="js/app.js"></script>
  </body>
</html>
